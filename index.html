<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>myblog</title>
  <meta name="description" content="A self-hosted personal blog." />
  <!-- Task 69: 基础 Open Graph / Twitter card. 这些是「无 JS 爬虫」看到
       的回退值；登录后或 SPA hydrated 后，DocumentMeta 会按当前页面
       覆盖 og:title / og:description 等 — 但 Slack/Twitter/Facebook
       的预览爬虫不执行 JS，所以这一层默认值才是它们看到的。 -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="myblog" />
  <meta property="og:title" content="myblog" />
  <meta property="og:description" content="A self-hosted personal blog." />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="myblog" />
  <meta name="twitter:description" content="A self-hosted personal blog." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@400;500;600&family=Noto+Serif+SC:wght@400;500;600&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet" />
  <!-- Task 38: feed-discovery so browsers' built-in subscribe UI picks up the Atom feed. -->
  <link rel="alternate" type="application/atom+xml" title="myblog · Atom feed" href="/api/feed.xml" />
</head>
